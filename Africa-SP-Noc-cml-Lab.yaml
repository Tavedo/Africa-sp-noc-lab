  - border_color: '#00000000'
    border_style: ''
    color: '#808080FF'
    rotation: 0
    text_bold: false
    text_content: |-
      Device               #   Type    Role                        VRF / Protocol
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
      UPSTREAM-ISP         1   IOSv    Internet peer AS65000        Global / eBGP
      SP-PE1-LAGOS         2   IOSv    PE hub Nigeria               OSPF+LDP+BGP+4xVRF
      SP-P1-CORE           3   IOSv    Core LSR                     OSPF+LDP only
      SP-P2-CORE           4   IOSv    Core LSR                     OSPF+LDP only
      SP-RR1               5   IOSv    iBGP Route Reflector         OSPF+LDP+iBGP
      SP-PE2-DAKAR         6   IOSv    PE Senegal                   OSPF+LDP+VRF CUSTOMER
      SP-PE3-JHB           7   IOSv    PE South Africa              OSPF+LDP+VRF CUSTOMER
      CE-NIGERIA           8   IOSv    CE Nigeria AS65001           VRF NIGERIA-ISP
      CE-SENEGAL           9   IOSv    CE Senegal AS65002           VRF CUSTOMER
      SE-SOUTHAFRICA      10   IOSv    CE South Africa AS65003      VRF CUSTOMER
      CE-NIGER            11   IOSv    CE Niger AS65004  NEW        VRF NIGER-MPLS
      CE-DIA              12   IOSv    CE DIA customer AS65005 NEW  VRF DIA-CUSTOMER
      SDWAN-HUB           13   IOSv    DMVPN hub Nigeria  NEW       OSPF2+GRE tunnel
      SDWAN-SPOKE1        14   IOSv    DMVPN spoke Senegal NEW      OSPF2+GRE tunnel
      SDWAN-SPOKE2        15   IOSv    DMVPN spoke S.Africa NEW     OSPF2+GRE tunnel
      ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

      VRF TABLE on PE1-LAGOS:
      VRF NIGERIA-ISP   RD 65100:2  RT 65100:2  AS65001  CE-NIGERIA
      VRF NIGER-MPLS    RD 65100:3  RT 65100:3  AS65004  CE-NIGER
      VRF DIA-CUSTOMER  RD 65100:4  RT 65100:4  AS65005  CE-DIA (internet)

      VRF TABLE on PE2-DAKAR + PE3-JHB:
      VRF CUSTOMER      RD 65100:1  RT 65100:1  CE-SENEGAL + SE-SOUTHAFRICA

      KEY RULES LEARNED:
      1. ip ospf 1 area 0 on Loopback0 — MANDATORY on all SP routers
      2. passive-interface only on global-table interfaces in OSPF
      3. VRF interfaces are invisible to OSPF — no passive-interface needed
      4. remote-as must be at top-level BGP before address-family
      5. route-reflector-client goes INSIDE address-family only
      6. No peer-group activation in address-family on IOSv
      7. CE loopbacks use /24 (simulates LAN) not /32
      8. Always ping source loopback from CE routers
      9. Duplicate IPs kill OSPF — both ends of a link need different IPs
      10. DIA = ip route vrf NAME 0.0.0.0 0.0.0.0 global + default-originate
    text_font: monospace
