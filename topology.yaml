lab:
  description: >-
    Africa SP NOC Lab - Simulates a Service Provider MPLS/BGP network for a
    telecom operator providing connectivity services (MPLS L3VPN, IP Transit,
    DIA) across Nigeria, Senegal, and South Africa. Designed for NOC engineer
    portfolio demonstration.
  notes: >-
    TOPOLOGY OVERVIEW:
    - SP-PE1-LAGOS: PE router, Nigeria PoP, eBGP with UPSTREAM-ISP and CE-NIGERIA
    - SP-PE2-DAKAR: PE router, Senegal PoP, eBGP with CE-SENEGAL
    - SP-PE3-JHB: PE router, South Africa PoP, eBGP with CE-SOUTHAFRICA
    - SP-P1-CORE / SP-P2-CORE: Core P routers (Label Switch Routers)
    - SP-RR1: iBGP Route Reflector for all PEs
    - UPSTREAM-ISP: Simulates Internet upstream peer (AS 65000)
    - CE-NIGERIA / CE-SENEGAL / CE-SOUTHAFRICA: Customer Edge routers

    PROTOCOLS: OSPF (IGP backbone), LDP (MPLS), MP-BGP VPNv4 (L3VPN), eBGP (Transit/CE)
    AS: SP=65100 | Upstream=65000 | CE-NG=65001 | CE-SN=65002 | CE-SA=65003

    See README.md for full IP plan, verification commands, and NOC scenarios.
  title: Africa SP NOC Lab — MPLS BGP Portfolio
  version: 0.1.0

nodes:
  - id: n0
    label: SP-PE1-LAGOS
    node_definition: iosv
    x: -300
    y: -200
    interfaces:
      - id: i0
        label: Loopback0
        slot: 0
        type: loopback
      - id: i1
        label: GigabitEthernet0/0
        slot: 1
      - id: i2
        label: GigabitEthernet0/1
        slot: 2
      - id: i3
        label: GigabitEthernet0/2
        slot: 3
      - id: i4
        label: GigabitEthernet0/3
        slot: 4
    configuration: |-
      hostname SP-PE1-LAGOS
      !
      ip vrf CUSTOMER
       rd 65100:1
       route-target export 65100:1
       route-target import 65100:1
      !
      mpls label protocol ldp
      mpls ldp router-id Loopback0 force
      !
      interface Loopback0
       ip address 10.0.0.1 255.255.255.255
       ip ospf 1 area 0
      !
      interface GigabitEthernet0/0
       description TO_SP-P1-CORE
       ip address 10.1.1.1 255.255.255.252
       ip ospf 1 area 0
       ip ospf network point-to-point
       mpls ip
       no shutdown
      !
      interface GigabitEthernet0/1
       description TO_SP-P2-CORE
       ip address 10.1.2.1 255.255.255.252
       ip ospf 1 area 0
       ip ospf network point-to-point
       mpls ip
       no shutdown
      !
      interface GigabitEthernet0/2
       description TO_UPSTREAM-ISP
       ip address 203.0.113.2 255.255.255.252
       no shutdown
      !
      interface GigabitEthernet0/3
       description TO_CE-NIGERIA (VRF CUSTOMER)
       ip vrf forwarding CUSTOMER
       ip address 10.2.1.1 255.255.255.252
       no shutdown
      !
      router ospf 1
       router-id 10.0.0.1
       passive-interface GigabitEthernet0/2
       passive-interface GigabitEthernet0/3
      !
      router bgp 65100
       bgp router-id 10.0.0.1
       bgp log-neighbor-changes
       no bgp default ipv4-unicast
       !
       neighbor 10.0.0.6 remote-as 65100
       neighbor 10.0.0.6 description iBGP-TO-RR1
       neighbor 10.0.0.6 update-source Loopback0
       !
       neighbor 203.0.113.1 remote-as 65000
       neighbor 203.0.113.1 description eBGP-TO-UPSTREAM-ISP
       !
       neighbor 10.2.1.2 remote-as 65001
       neighbor 10.2.1.2 description eBGP-CE-NIGERIA
       !
       address-family ipv4 unicast
        neighbor 10.0.0.6 activate
        neighbor 203.0.113.1 activate
        neighbor 203.0.113.1 send-community
        neighbor 10.0.0.6 next-hop-self
       exit-address-family
       !
       address-family vpnv4
        neighbor 10.0.0.6 activate
        neighbor 10.0.0.6 send-community extended
       exit-address-family
       !
       address-family ipv4 vrf CUSTOMER
        neighbor 10.2.1.2 remote-as 65001
        neighbor 10.2.1.2 activate
        neighbor 10.2.1.2 as-override
       exit-address-family
      !
      ip route 0.0.0.0 0.0.0.0 203.0.113.1
      !
      line con 0
       logging synchronous
      end

